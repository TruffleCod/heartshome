<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>&#24515;&#20043;&#23478;</title>
    <script>
      (() => {
        const baseUrl = '%BASE_URL%';
        const siteProfiles = {
          heartHome: { title: '\u5fc3\u4e4b\u5bb6', icon: 'favicon-heart-home.svg' },
          mingchuanNews: { title: '\u660e\u5ddd\u65b0\u95fb\u7f51', icon: 'favicon-mingchuan-news.svg' },
          dongyangBlog: { title: '\u4e1c\u9633\u65e7\u4e8b\u535a\u5ba2', icon: 'favicon-dongyang-blog.svg' },
          blackFlower: { title: '\u5fc3\u4e4b\u5bb6', icon: 'favicon-black-flower.svg' },
        };
        const mingchuanNewsSlugs = new Set([
          'ab6f90d2c4', 'd4c1e8a07f', '2ad87e50c9', '9fe021c7ad', '3cf0b79a12',
          '50a8f6c3d1', 'c8f09a3e61', 'f0d4c8a2b9', '86f1c4b0ed', '44d2ae09f6',
        ]);
        const dongyangBlogSlugs = new Set([
          '71a6d0e2bf', 'b4e9820fa1', '0c1f8a6d94', 'e6b0c3f91a', '1fd9a0c7e4',
          'a0c8e37b5f', 'c49e1a0f72', '7f2da90b31', 'ed31c8b047', '4b0e72f6a9',
          '9c73ae0d6b', 'd8b3f2a6c0',
        ]);
        const blackFlowerSlugs = new Set(['e08c72fa9d', '6c9f02a7bd', 'd7e40a1c9b', 'a19de704c6']);
        const pathname = window.location.pathname;
        const pageSlug = pathname.match(/\/p\/([^/]+)/)?.[1];
        let siteKey = 'heartHome';

        if (pathname.endsWith('/news/search') || mingchuanNewsSlugs.has(pageSlug)) {
          siteKey = 'mingchuanNews';
        } else if (pathname.endsWith('/p/71a6d0e2bf/search') || dongyangBlogSlugs.has(pageSlug)) {
          siteKey = 'dongyangBlog';
        } else if (blackFlowerSlugs.has(pageSlug)) {
          siteKey = 'blackFlower';
        }

        const siteProfile = siteProfiles[siteKey];
        document.title = siteProfile.title;
        const iconLink = document.createElement('link');
        iconLink.rel = 'icon';
        iconLink.type = 'image/svg+xml';
        iconLink.href = `${baseUrl}${siteProfile.icon}`;
        document.head.appendChild(iconLink);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
